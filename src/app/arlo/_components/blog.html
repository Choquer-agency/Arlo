<section class="arlo-blog" style="padding:96px 0 132px!important"><div class="arlo-blog-inner"><div class="arlo-blog-head"><div class="arlo-blog-eyebrow">{{eyebrow}}</div><h2 class="arlo-blog-title">{{heading}}</h2></div><div class="arlo-blog-grid">{{#each cards}}<a class="arlo-blog-card" href="{{href}}"><div class="arlo-blog-media"><img loading="lazy" src="{{image}}" alt="ARLO blog post"/></div><div class="arlo-blog-body"><span class="arlo-blog-tag">{{tag}}</span><h3 class="arlo-blog-card-title">{{title}}</h3><span class="arlo-blog-meta">{{meta}}</span></div></a>{{/each}}</div></div></section>
