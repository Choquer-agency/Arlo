<section class="arlo-faq"><div class="arlo-faq-inner"><div class="arlo-faq-left"><div class="arlo-faq-eyebrow">{{eyebrow}}</div><h2 class="arlo-faq-title">{{heading}}</h2><p class="arlo-faq-sub">{{subtext}}</p><p class="arlo-faq-contact">{{contactPre}} <a href="{{contactHref}}">{{contactLink}}</a></p></div><div class="arlo-faq-list">{{#each items}}<details class="arlo-faq-item"><summary class="arlo-faq-q"><span>{{q}}</span><svg class="arlo-faq-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></summary><div class="arlo-faq-a">{{a}}</div></details>{{/each}}</div></div></section>
