<section id="arlo-stab-section" class="arlo-xsol"><div class="arlo-padding-global"><div class="arlo-container-large"><div class="arlo-stab_content"><div class="arlo-section_intro-component is-centered"><div class="arlo-section_intro-tag">{{eyebrow}}</div><h2 class="arlo-heading-style-h3 text-color-neutral-800 max-width-medium">{{heading}}</h2></div><div id="arlo-stab" class="arlo-stab_tabs"><div class="hide-2 ui-embed ui-script"><!-- Tabs Styles -->
<style>

.arlo-stab_link.is-active .arlo-stab-link_dot {
  width: 0.375rem;
  margin-right: 0.5rem;
  opacity: 1;
}

.arlo-stab_link.is-active .arlo-stab-link_progress-bar-fill{
  width: 100%;
  transition: width 6s ease;
}

.arlo-stab_link.is-active .arlo-stab_pane {
	max-height: 80rem;
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const TOTAL_TABS = 4;
  const INTERVAL = 6000;
  const section = document.querySelector("#arlo-stab-section");

  if (!section) return;

  let current = 1;
  let timer = null;

  /* ---------------------------
     Core helpers
  --------------------------- */

  function activateTab(index) {
    // Remove active state from all tabs and panes
    document
      .querySelectorAll("[arlo-stab-link], [arlo-stab-pane]")
      .forEach(el => el.classList.remove("is-active"));

    // Activate matching tab links
    document
      .querySelectorAll(`[arlo-stab-link="${index}"]`)
      .forEach(el => el.classList.add("is-active"));

    // Activate matching panes
    document
      .querySelectorAll(`[arlo-stab-pane="${index}"]`)
      .forEach(el => el.classList.add("is-active"));
  }

  function deactivateAll() {
    document
      .querySelectorAll("[arlo-stab-link], [arlo-stab-pane]")
      .forEach(el => el.classList.remove("is-active"));
  }

  function startLoop() {
    if (timer) return;

    timer = setInterval(() => {
      current = current < TOTAL_TABS ? current + 1 : 1;
      activateTab(current);
    }, INTERVAL);
  }

  function stopLoop() {
    clearInterval(timer);
    timer = null;
  }

  /* ---------------------------
     Initial state
  --------------------------- */

  deactivateAll();

  /* ---------------------------
     Click handling
  --------------------------- */

  document.querySelectorAll("[arlo-stab-link]").forEach(link => {
    link.addEventListener("click", () => {
      const clickedIndex = parseInt(
        link.getAttribute("arlo-stab-link"),
        10
      );

      if (!clickedIndex) return;

      current = clickedIndex;
      activateTab(current);
      stopLoop();
      startLoop();
    });
  });

  /* ---------------------------
     Intersection Observer
  --------------------------- */

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          activateTab(current);
          startLoop();
        } else {
          stopLoop();
          deactivateAll();
        }
      });
    },
    { threshold: 0 }
  );

  observer.observe(section);
});
</script>
