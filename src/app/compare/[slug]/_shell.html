<script>
document.addEventListener("DOMContentLoaded", () => {
  const darkSections = document.querySelectorAll('[section-theme="dark"]');
  const navTargets = document.querySelectorAll('[nav-dark-state]');

  const observer = new IntersectionObserver(
    (entries) => {
      const isDarkActive = entries.some(entry => entry.isIntersecting);

      navTargets.forEach(el => {
        el.classList.toggle("dark-state", isDarkActive);
      });
    },
    {
      root: null,
      threshold: 0,
      rootMargin: "-1px 0px -99% 0px"
    }
  );

  darkSections.forEach(section => observer.observe(section));
});
</script>

<!-- Responsive Menu and Mega Menu  -->
<script>
(() => {
  "use strict";
  const CFG = {
    navRootSelector: ".arlo-nav_component",
    triggerSelector: ".arlo-nav_menu-item",
    megaRootSelector: ".js-mega-root",
    megaPanelSelector: ".js-mega-panel",
    wrapperSelector: ".arlo-main-wrapper",
    wrapperOpenClass: "has-mega-open",
    closeBtnSelectors: [".close-icon", ".nav_menu-close-icon"],
    mobileToggleSelector: ".ui-nav-button",
    openDelay: 90,
    closeDelay: 220,
    switchDelay: 60,
    openClass: "is-mega-open",
    navOpenClass: "has-mega-open",
    preventClickNav: true
  };

  const prefersReducedMotion = () =>
    window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const isTouchMode = () =>
    window.matchMedia &&
    (window.matchMedia("(hover: none)").matches ||
      window.matchMedia("(pointer: coarse)").matches);

  const setAria = (el, attrs) => {
    if (!el) return;
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  };

  const findMegaForTrigger = (trigger, megaRoot) => {
    if (!trigger || !megaRoot) return null;
    for (const cls of trigger.classList) {
      if (cls === "nav_menu-item" || cls === "ui-inline-block" || cls === "arlo-nav_menu-item") continue;
      const panel = megaRoot.querySelector(`#${CSS.escape(cls)}`);
      if (panel && panel.matches(CFG.megaPanelSelector)) return { id: cls, panel };
    }
    return null;
  };

  class ArloMegaMenu {
    constructor(navRoot, megaRoot, wrapper) {
      this.navRoot = navRoot;
      this.megaRoot = megaRoot;
      this.wrapper = wrapper;
      this.active = { trigger: null, panel: null, id: null };
      this.timers = { open: null, close: null };
      this.hoveringTrigger = false;
      this.hoveringMega = false;

      this.onTriggerEnter = this.onTriggerEnter.bind(this);
      this.onTriggerLeave = this.onTriggerLeave.bind(this);
      this.onMegaEnter = this.onMegaEnter.bind(this);
      this.onMegaLeave = this.onMegaLeave.bind(this);
      this.onNavMove = this.onNavMove.bind(this);
      this.onNavLeave = this.onNavLeave.bind(this);
      this.onDocPointerDown = this.onDocPointerDown.bind(this);
      this.onKeyDown = this.onKeyDown.bind(this);
      this.onFocusIn = this.onFocusIn.bind(this);
      this.onNavClick = this.onNavClick.bind(this);
      this.onMegaClick = this.onMegaClick.bind(this);
      this.onMobileTogglePointerDown = this.onMobileTogglePointerDown.bind(this);

      this.init();
    }

    init() {
      this.setupARIA();

      // Desktop hover behavior
      if (!isTouchMode()) {
        const triggers = this.navRoot.querySelectorAll(CFG.triggerSelector);
        triggers.forEach((t) => {
          t.addEventListener("pointerenter", this.onTriggerEnter);
          t.addEventListener("pointerleave", this.onTriggerLeave);
        });
        this.megaRoot.addEventListener("pointerenter", this.onMegaEnter);
        this.megaRoot.addEventListener("pointerleave", this.onMegaLeave);
        this.navRoot.addEventListener("pointermove", this.onNavMove);
        this.navRoot.addEventListener("pointerleave", this.onNavLeave);
      }

      // Outside click/tap closes (desktop & touch)
      document.addEventListener("pointerdown", this.onDocPointerDown, true);

      // Keyboard/focus support
      this.navRoot.addEventListener("keydown", this.onKeyDown);
      this.navRoot.addEventListener("focusin", this.onFocusIn);

      // FIX: Use capture phase for click so it fires BEFORE Arlo's navbar JS
      // This ensures we can preventDefault before Arlo processes the link
      this.navRoot.addEventListener("click", this.onNavClick, true);

      // FIX: Also add direct click handlers on each mega trigger as a safety net
      // In case event delegation via navRoot is blocked by Arlo or another script
      const triggers = this.navRoot.querySelectorAll(CFG.triggerSelector);
      triggers.forEach((t) => {
        const found = findMegaForTrigger(t, this.megaRoot);
        if (found) {
          t.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            this.clearTimers();
            if (this.active.id === found.id) this.close();
            else this.open(t, found.panel, found.id);
          });
        }
      });

      // Close icon clicks inside mega
      this.megaRoot.addEventListener("click", this.onMegaClick);

      // FIX: Close mega menu when Arlo's mobile menu toggle is pressed.
      // Listening on pointerdown (capture) so the mega closes BEFORE Arlo
      // animates the mobile nav in/out — prevents the mega from sitting on
      // top of the opening mobile nav, and ensures it's gone when the nav
      // closes too. Arlo's own toggle behavior is left untouched.
      const mobileToggles = document.querySelectorAll(CFG.mobileToggleSelector);
      mobileToggles.forEach((btn) => {
        btn.addEventListener("pointerdown", this.onMobileTogglePointerDown, true);
      });

      this.close("init");
    }

    setupARIA() {
      const triggers = this.navRoot.querySelectorAll(CFG.triggerSelector);
      triggers.forEach((trigger) => {
        const found = findMegaForTrigger(trigger, this.megaRoot);
        if (!found) return;
        setAria(trigger, {
          "aria-haspopup": "true",
          "aria-controls": found.id,
          "aria-expanded": "false"
        });
        setAria(found.panel, {
          role: "region",
          "aria-hidden": "true"
        });
      });
    }

    clearTimers() {
      if (this.timers.open) clearTimeout(this.timers.open);
      if (this.timers.close) clearTimeout(this.timers.close);
      this.timers.open = null;
      this.timers.close = null;
    }

    applyOpenState(isOpen) {
      this.megaRoot.classList.toggle(CFG.openClass, isOpen);
      this.navRoot.classList.toggle(CFG.navOpenClass, isOpen);
      if (this.wrapper) this.wrapper.classList.toggle(CFG.wrapperOpenClass, isOpen);
    }

    open(trigger, panel, id) {
      if (!trigger || !panel || !id) return;
      if (this.active.id && this.active.id !== id) this.close("switch");
      this.active = { trigger, panel, id };
      trigger.classList.add(CFG.openClass);
      panel.classList.add(CFG.openClass);
      this.applyOpenState(true);
      setAria(trigger, { "aria-expanded": "true" });
      setAria(panel, { "aria-hidden": "false" });
    }

    close() {
      const { trigger, panel } = this.active;
      if (trigger) {
        trigger.classList.remove(CFG.openClass);
        setAria(trigger, { "aria-expanded": "false" });
      }
      if (panel) {
        panel.classList.remove(CFG.openClass);
        setAria(panel, { "aria-hidden": "true" });
      }
      this.applyOpenState(false);
      this.active = { trigger: null, panel: null, id: null };
    }

    scheduleOpen(trigger) {
      const found = findMegaForTrigger(trigger, this.megaRoot);
      if (!found) {
        if (this.active.id) this.scheduleClose();
        return;
      }
      this.clearTimers();
      const delay = prefersReducedMotion()
        ? 0
        : this.active.id && this.active.trigger !== trigger
          ? CFG.switchDelay
          : CFG.openDelay;
      this.timers.open = setTimeout(() => {
        this.open(trigger, found.panel, found.id);
      }, delay);
    }

    scheduleClose({ immediate = false } = {}) {
      this.clearTimers();
      const delay = prefersReducedMotion() ? 0 : immediate ? 0 : CFG.closeDelay;
      this.timers.close = setTimeout(() => {
        if (!this.hoveringTrigger && !this.hoveringMega) this.close();
      }, delay);
    }

    // ---------------- Hover intent handlers (desktop) ----------------
    onTriggerEnter(e) {
      this.hoveringTrigger = true;
      this.clearTimers();
      this.scheduleOpen(e.currentTarget);
    }

    onTriggerLeave(e) {
      this.hoveringTrigger = false;
      const toEl = e.relatedTarget;
      const goingToMega = toEl && this.megaRoot.contains(toEl);
      if (goingToMega) {
        this.clearTimers();
        return;
      }
      if (this.active.id) this.scheduleClose();
    }

    onMegaEnter() {
      this.hoveringMega = true;
      this.clearTimers();
    }

    onMegaLeave(e) {
      this.hoveringMega = false;
      const toEl = e.relatedTarget;
      const goingToTrigger = toEl && this.navRoot.contains(toEl);
      if (goingToTrigger) {
        this.clearTimers();
        return;
      }
      if (this.active.id) this.scheduleClose();
    }

    onNavMove(e) {
      if (!this.active.id) return;
      const target = e.target;
      const trigger = target.closest(CFG.triggerSelector);
      if (trigger && this.navRoot.contains(trigger)) {
        const found = findMegaForTrigger(trigger, this.megaRoot);
        if (found) return;
      }
      this.hoveringTrigger = false;
      this.scheduleClose();
    }

    onNavLeave(e) {
      const toEl = e.relatedTarget;
      const goingToMega = toEl && this.megaRoot.contains(toEl);
      if (!goingToMega && this.active.id) {
        this.hoveringTrigger = false;
        this.scheduleClose();
      }
    }

    // ---------------- Click / keyboard ----------------
    onNavClick(e) {
      const trigger = e.target.closest(CFG.triggerSelector);
      if (!trigger || !this.navRoot.contains(trigger)) return;

      // FIX: Always prevent # from being added to URL for hash-only links
      const link = trigger.matches("a") ? trigger : trigger.closest("a");
      if (link) {
        const href = link.getAttribute("href");
        if (!href || href === "#" || href === "#!") {
          e.preventDefault();
          e.stopPropagation(); // Stop Arlo's navbar JS from also processing this
        }
      }

      const found = findMegaForTrigger(trigger, this.megaRoot);
      this.clearTimers();

      if (!found) {
        if (this.active.id) this.close();
        return;
      }

      if (CFG.preventClickNav) {
        e.preventDefault();
        e.stopPropagation();
      }

      if (this.active.id === found.id) this.close();
      else this.open(trigger, found.panel, found.id);
    }

    onKeyDown(e) {
      if (e.key === "Escape") {
        this.clearTimers();
        this.close();
        return;
      }
      const trigger = e.target.closest(CFG.triggerSelector);
      if (!trigger) return;
      const found = findMegaForTrigger(trigger, this.megaRoot);
      if (!found) return;
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        this.clearTimers();
        if (this.active.id === found.id) this.close();
        else this.open(trigger, found.panel, found.id);
      }
    }

    onFocusIn(e) {
      const trigger = e.target.closest(CFG.triggerSelector);
      if (!trigger || !this.navRoot.contains(trigger)) return;
      const found = findMegaForTrigger(trigger, this.megaRoot);
      if (!found) return;
      this.clearTimers();
      this.open(trigger, found.panel, found.id);
    }

    onDocPointerDown(e) {
      if (!this.active.id) return;
      // Don't treat the mobile toggle as "outside" — its dedicated handler
      // takes care of closing the mega, and we don't want a double-close race.
      if (e.target.closest(CFG.mobileToggleSelector)) return;
      const inside = this.navRoot.contains(e.target) || this.megaRoot.contains(e.target);
      if (inside) {
        this.clearTimers();
        return;
      }
      this.clearTimers();
      this.close();
    }

    onMegaClick(e) {
      const selector = CFG.closeBtnSelectors.join(",");
      const btn = e.target.closest(selector);
      if (!btn || !this.megaRoot.contains(btn)) return;
      e.preventDefault();
      this.clearTimers();
      this.close();
    }

    // FIX: Mobile menu toggle handler.
    // Whenever the toggle is pressed and the mega menu is open, close the
    // mega immediately. This covers both cases:
    //   1. Toggle showing X + mega open  -> mega closes, Arlo closes nav.
    //   2. Toggle showing hamburger + mega open -> mega closes, Arlo opens nav.
    // We don't preventDefault or stopPropagation — Arlo's own toggle keeps
    // working exactly as before.
    onMobileTogglePointerDown() {
      if (!this.active.id) return;
      this.clearTimers();
      this.close();
    }
  }

  // ---- Robust boot with retry + MutationObserver fallback ----
  let booted = false;

  const tryBoot = () => {
    if (booted) return true;
    const navRoot = document.querySelector(CFG.navRootSelector);
    const megaRoot = document.querySelector(CFG.megaRootSelector);
    const wrapper = document.querySelector(CFG.wrapperSelector);
    if (!navRoot || !megaRoot) return false;
    booted = true;
    new ArloMegaMenu(navRoot, megaRoot, wrapper);
    return true;
  };

  const boot = () => {
    if (tryBoot()) return;

    // Retry after short delay for async-rendered Arlo elements
    setTimeout(() => {
      if (tryBoot()) return;

      // Final fallback: watch DOM for mega root to appear
      const observer = new MutationObserver(() => {
        if (tryBoot()) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Give up after 8s to avoid leaking the observer
      setTimeout(() => observer.disconnect(), 8000);
    }, 500);
  };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
