name: Keepalive

# GitHub disables scheduled workflows after 60 days of repo inactivity. This
# makes a tiny commit twice a month so the SEO cron/routine ecosystem never
# gets auto-disabled. Also re-enables itself if it was disabled.
on:
  schedule:
    - cron: "17 8 1,15 * *" # 1st & 15th, 08:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive
        run: |
          git config user.name "arlo-seo-bot"
          git config user.email "seo-bot@askarlo.app"
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          git add .github/keepalive.txt
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: keepalive [skip ci]"
            git push
          fi
